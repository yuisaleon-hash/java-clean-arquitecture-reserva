# docker-compose.yml
version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: veterinary-postgres
    environment:
      POSTGRES_DB: veterinary_clinic
      POSTGRES_USER: veterinary_user
      POSTGRES_PASSWORD: veterinary_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - veterinary-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: veterinary-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@veterinary.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8081:80"
    depends_on:
      - postgres
    networks:
      - veterinary-network

volumes:
  postgres_data:

networks:
  veterinary-network:
    driver: bridge