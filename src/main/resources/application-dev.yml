# application-dev.yml
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/veterinary_clinic
    username: postgres
    password: 0racle
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: false

logging:
  level:
    com.veterinary.clinic: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

veterinary:
  clinic:
    notification:
      email:
        enabled: false  # Deshabilitar emails en desarrollo
      sms:
        enabled: false
