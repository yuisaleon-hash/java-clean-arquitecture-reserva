spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 25

logging:
  level:
    com.veterinary.clinic: WARN
    org.springframework: WARN
    org.hibernate: WARN
    ROOT: WARN

veterinary:
  clinic:
    notification:
      email:
        enabled: false
      sms:
        enabled: false
